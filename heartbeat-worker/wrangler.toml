name = "pergamino-heartbeat"
main = "src/index.ts"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]

# === Cron Triggers ===
# All times are in UTC; convert from client's local tz at deploy time.
# Heartbeat schedule per pergamino-intake YAML.
[triggers]
crons = [
  "30 14 * * 1-5",  # weekday early-morning local — reviewer-digest (UTC; substitute per CLIENT_TZ at deploy)
  "0 0 * * 2-6",    # weekday evening local — user-nudge (UTC; substitute per CLIENT_TZ at deploy)
  "0 3 * * 1"       # Sunday evening local — customer-bot-weekly (UTC; substitute per CLIENT_TZ at deploy)
]

# === KV bindings ===
# Conversation memory, audit log buffer, pending-PR cache
[[kv_namespaces]]
binding = "PERGAMINO_KV"
id = "<provisioned at deploy time>"

# === D1 binding ===
# Per-PR review history, customer conversations, knowledge-gap log
[[d1_databases]]
binding = "PERGAMINO_DB"
database_name = "pergamino-<client-slug>"
database_id = "<provisioned at deploy time>"

# === Secrets (set via `wrangler secret put`) ===
# ANTHROPIC_API_KEY      — client's Anthropic API key
# GITHUB_TOKEN           — fine-grained PAT with brain-canon read+write
# WHATSAPP_TOKEN         — Meta Cloud API token (for digest delivery)
# WHATSAPP_PHONE_ID      — Meta phone number ID
# WHATSAPP_VERIFY_TOKEN  — webhook verification
# REVIEWER_AGENTS_REPO   — github.com/<org>/pergamino-reviewer-agents (or branch ref)

# === Vars (non-secret config; live in wrangler.toml) ===
# Values below are placeholders substituted by `pergamino-deploy new <slug>` at provisioning time
# from the intake YAML produced by the `pergamino-intake` skill.
[vars]
CLIENT_SLUG = "{{SLUG}}"
CLIENT_DISPLAY = "{{COMPANY_DISPLAY}}"
CLIENT_TZ = "{{TIMEZONE_IANA}}"
BRAIN_CANON_REPO = "{{ORG}}/{{SLUG}}-brain-canon"
DEFAULT_CHANNEL = "whatsapp"
REVIEWER_DIGEST_RECIPIENTS = "{{PRINCIPAL_EMAIL}},{{OPERATOR_EMAIL}}"
USER_NUDGE_RECIPIENTS = "ALL_TEAM"  # uses GitHub team membership
CUSTOMER_FACING_ENABLED = "true"
LLM_MODEL_DEFAULT = "claude-sonnet-4-6"
LLM_MODEL_CHEAP = "claude-haiku-4-5"
