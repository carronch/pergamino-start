name = "pergamino-install"
main = "src/index.ts"
compatibility_date = "2026-05-08"

# Workers.dev URL stays enabled so the install endpoint is reachable
# even before pergamino.ai is on Cloudflare. After the nameserver move,
# uncomment the [[routes]] block below and `wrangler deploy` again.
workers_dev = true

# Public install endpoint: https://pergamino.ai/install
# Scoped to /install* only — the apex (pergamino.ai/*) belongs to the
# pergamino-ai site Worker (repo: pergamino.ai / pergamino-brand).
# Deploying this file replaces any broader route this worker held.
[[routes]]
pattern = "pergamino.ai/install*"
zone_name = "pergamino.ai"

# === Vars (non-secret config) ===
[vars]
BOOTSTRAP_URL = "https://raw.githubusercontent.com/carronch/pergamino-start/main/bootstrap.sh"
CACHE_TTL_SECONDS = "300"
